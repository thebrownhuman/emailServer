<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body style="margin:0;padding:0;background-color:#0d1117;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0d1117;">
        <tr>
            <td align="center" style="padding:40px 20px;">
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background-color:#161b26;border-radius:16px;border:1px solid rgba(255,255,255,0.1);max-width:600px;width:100%;">
                    <tr>
                        <td style="padding:32px 40px 16px;text-align:center;">
                            <h1 style="color:#2e77ff;font-size:24px;font-weight:700;margin:0;" th:text="${appName}">
                                AppName</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:8px 40px 32px;">
                            <h2 style="color:#22c55e;font-size:20px;font-weight:600;margin:0 0 16px;">📦 Order
                                Confirmed!</h2>
                            <p style="color:rgba(255,255,255,0.75);font-size:16px;line-height:1.6;margin:0 0 16px;">
                                Hi <span style="color:#fff;font-weight:600;" th:text="${userName}">User</span>,
                                your order has been placed successfully.
                            </p>
                            <div
                                style="background-color:rgba(46,119,255,0.1);border:1px solid rgba(46,119,255,0.3);border-radius:8px;padding:16px 20px;margin-bottom:24px;">
                                <span
                                    style="color:rgba(255,255,255,0.45);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;">Order
                                    ID</span><br />
                                <span
                                    style="color:#2e77ff;font-size:18px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:0.05em;"
                                    th:text="${orderId}">ORD-2026-001</span>
                            </div>
                            <table width="100%" cellpadding="0" cellspacing="0"
                                style="background-color:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.08);margin-bottom:16px;">
                                <tr>
                                    <td style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);">
                                        <span
                                            style="color:rgba(255,255,255,0.45);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;">Items</span><br />
                                        <span style="color:#fff;font-size:15px;font-weight:500;"
                                            th:text="${items}">iPhone 15, AirPods Pro</span>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding:16px 20px;">
                                        <span
                                            style="color:rgba(255,255,255,0.45);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;">Total</span><br />
                                        <span style="color:#22c55e;font-size:18px;font-weight:700;"
                                            th:text="${total}">₹1,25,000</span>
                                    </td>
                                </tr>
                            </table>
                            <p style="color:rgba(255,255,255,0.65);font-size:14px;line-height:1.6;margin:0;"
                                th:if="${deliveryDate}">
                                Estimated delivery: <span style="color:#fff;font-weight:500;"
                                    th:text="${deliveryDate}">March 15, 2026</span>
                            </p>
                            <table width="100%" cellpadding="0" cellspacing="0" th:if="${trackingUrl}">
                                <tr>
                                    <td align="center" style="padding:24px 0 0;">
                                        <a th:href="${trackingUrl}"
                                            style="display:inline-block;background-color:#2e77ff;color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:8px;">
                                            Track Order →
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px 40px;text-align:center;border-top:1px solid rgba(255,255,255,0.06);">
                            <p style="color:rgba(255,255,255,0.35);font-size:12px;margin:0;"
                                th:text="'© ' + ${year} + ' ' + ${appName} + '. All rights reserved.'">© 2026 AppName
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
