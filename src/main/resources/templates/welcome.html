<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
</head>

<body style="margin:0; padding:0; background-color:#0d1117; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0d1117;">
        <tr>
            <td align="center" style="padding:40px 20px;">
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background-color:#161b26; border-radius:16px; border:1px solid rgba(255,255,255,0.1); max-width:600px; width:100%;">

                    <!-- Header -->
                    <tr>
                        <td style="padding:32px 40px 16px; text-align:center;">
                            <h1 style="color:#2e77ff; font-size:24px; font-weight:700; margin:0;" th:text="${appName}">
                                AppName</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding:8px 40px 32px;">
                            <h2 style="color:#ffffff; font-size:22px; font-weight:600; margin:0 0 16px;">
                                Welcome aboard, <span th:text="${userName}">User</span>! 🎉
                            </h2>
                            <p style="color:rgba(255,255,255,0.75); font-size:16px; line-height:1.6; margin:0 0 24px;">
                                Your account has been created successfully. You're now part of the
                                <span style="color:#2e77ff; font-weight:600;" th:text="${appName}">AppName</span>
                                community.
                            </p>

                            <!-- CTA Button -->
                            <table width="100%" cellpadding="0" cellspacing="0" th:if="${dashboardUrl}">
                                <tr>
                                    <td align="center" style="padding:8px 0 16px;">
                                        <a th:href="${dashboardUrl}" style="display:inline-block; background-color:#2e77ff; color:#ffffff;
                                              font-size:16px; font-weight:600; text-decoration:none;
                                              padding:14px 40px; border-radius:8px;">
                                            Go to Dashboard →
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p style="color:rgba(255,255,255,0.45); font-size:14px; line-height:1.6; margin:16px 0 0;">
                                If you didn't create this account, please ignore this email.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:24px 40px; text-align:center; border-top:1px solid rgba(255,255,255,0.06);">
                            <p style="color:rgba(255,255,255,0.35); font-size:12px; margin:0;"
                                th:text="'© ' + ${year} + ' ' + ${appName} + '. All rights reserved.'">
                                © 2026 AppName. All rights reserved.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
